<!doctype html>
<html>
	<head>
		<!--Titulo del Sitio -->
		<title>Home</title>

		<!-- Required meta tags -->
		<meta charset="utf-8" />
		<!--responsive site-->
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	</head>
	<!--Estilos bootstrap -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
		rel="stylesheet"
		crossorigin="anonymous"
	/>
	<body>
		<!--JS bootstrap -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
			crossorigin="anonymous"
		></script>

		<!--CONTENIDO -->
		<header>
			<!-- Navbar content -->
			<nav class="navbar navbar-dark bg-dark">
				<div class="container-fluid">
					<a class="navbar-brand" href="#">Sistema - Veterinaria</a>
					<button
						class="navbar-toggler"
						type="button"
						data-bs-toggle="collapse"
						data-bs-target="#navbarNavAltMarkup"
						aria-controls="navbarNavAltMarkup"
						aria-expanded="false"
						aria-label="Toggle navigation"
					>
						<span class="navbar-toggler-icon"></span>
					</button>
					<div class="collapse navbar-collapse" id="navbarText"></div>
					<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
						<div class="navbar-nav">
							<a
								class="nav-link disabled"
								href="#"
								tabindex="-1"
								aria-disabled="true"
								>Menu desactivado</a
							>
							<a class="nav-link" href="index.html">Salir</a>
						</div>
					</div>
				</div>
			</nav>
		</header>

        <!--Sección Bienvenida-->
		<div class="container">
			<div class="card">
				<div class="card-body">
					<h5 class="card-title">Bienvenidos al Sistema</h5>
                    <h6 class="mb-1">Usuario: <span class="badge bg-info text-dark" id="nombreUsuario"></span></p></h6>
					<p class="card-text">Registra los datos de los clientes</p>
                    
				</div>
			</div>
		</div>
		&nbsp;

        <!--Sección Formulario-->
        <div class="container">
            <h3>Datos del Cliente</h3>
            <div class="row">
                <div class="col">
                    <input type="number" class="form-control" placeholder="ID Registro" id="idReg"/> 
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Nombre"  id="nameReg">
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Primer Apellido"  id="primerApReg">
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Segundo Apellido"  id="segApReg">
                </div>
            </div>
            <br>
            <div class="row">
                <div class="col">
                    <label class="form-label">Fecha de Alta:</label><input type="date" class="form-control" id="startDate" />
                </div>
                <div class="col">
                    <label class="form-label">&nbsp;</label><input type="number" class="form-control"  placeholder="Numero Teléfono" id="numTel" />
                </div>
            </div>
            <br>
            <h3>Datos Mascota</h3>
             <div class="row">
                <div class="col">
                    <select class="form-select" id="pet">
                       <option value="" selected disabled>Tipo Mascota</option>
                        <option value="Perro">Perro</option>
                        <option value="Gato">Gato</option>
                        <option value="Conejo">Conejo</option>
                    </select>
                </div>
                 <div class="col">
                    <input type="text" class="form-control" placeholder="Raza"  id="razaPet">
                </div>
                <div class="col">
                    <input type="text" class="form-control" placeholder="Nombre mascota"  id="namePet">
                </div>
                 <div class="col">
                   	<textarea  class="form-control" placeholder="Comentarios" id="comments"></textarea>
                </div>
             </div>
             <br>
            <div class="row">
                <button type="button" class="btn btn-success" onclick="addTask(clearForm)">Guardar Tarea</button>
            </div>
        </div>

		<hr />
<h3>Editar Registro</h3>

<div class="container">
    <input type="hidden" id="editIndex" />

    <div class="row">
        <div class="col">
            <label>Estatus:</label>
            <select id="statusEdit" class="form-select">
                <option value="En progreso">En progreso</option>
                <option value="Rechazado">Rechazado</option>
                <option value="Cancelado">Cancelado</option>
                <option value="Cerrado">Cerrado</option>
            </select>
        </div>

        <div class="col">
            <label>Nuevo comentario:</label>
            <input type="text" id="newComment" class="form-control" />
        </div>
    </div>

    <br />
    <button class="btn btn-primary" onclick="updateRecord()">Actualizar</button>
</div>

<div class="container">
    <label>Filtrar por estatus:</label>
    <select class="form-select" onchange="filterRecords(this.value)">
        <option value="Todos">Todos</option>
        <option value="Nuevo">Por hacer</option>
        <option value="En progreso">En progreso</option>
        <option value="Rechazado">Rechazado</option>
        <option value="Cancelado">Cancelado</option>
        <option value="Cerrado">Cerrado</option>
    </select>
</div>

        <br>
         <!--Mostrar Datos Tabla-->
        <div class="table-responsive container overflow-scroll" style="max-height:300;">

                <table class="table table-hover">
                    <thead>
                      <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Nombre Cliente</th>
                        <th scope="col">Apellido Cliente</th>
                        <th scope="col">Fecha Alta</th>
                        <th scope="col">Mascota</th>
                        <th scope="col">Nombre mascota</th>
                        <th scope="col">Estatus</th>
                      </tr>
                    </thead>
                    <tbody id="recordTable">
                        
                    </tbody>
                </table>
			</div>



		<!-- Funciones JS -->
		<script src="index.js"></script>
		<script>
			let usuario = localStorage.getItem("usuarioActivo");

			if (usuario) {
				document.getElementById("nombreUsuario").innerText = usuario;
			} else {
				// Si no hay sesión, regresar al login
				window.location = "index.html";
			}
		</script>
	</body>
</html>
